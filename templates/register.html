{% extends "base.html" %}
{% block content %}
<div class="container mt-4" style="max-width:520px;">
  <div class="fz-card p-4" data-aos="fade-up">
    <h1 class="h4 fw-bold">Cadastrar</h1>
    <p class="fz-muted mb-3">Crie sua conta com telefone e uma senha numérica de 6 dígitos.</p>

    <form method="post">
      <div class="mb-3">
        <label class="form-label">Telefone (com DDD)</label>
        <input name="telefone" class="form-control" placeholder="(31) 9xxxx-xxxx" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Senha (6 dígitos)</label>
        <input name="senha" class="form-control" inputmode="numeric" maxlength="6" placeholder="Ex: 123456" required>
      </div>

      <button class="btn btn-fz w-100">Criar conta</button>
    </form>

    <div class="mt-3 small">
      Já tem conta? <a href="{{ url_for('login') }}">Fazer login</a>
    </div>
  </div>
</div>
{% endblock %}
