<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Pedido #{{ pedido.id }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

<h3>Pedido #{{ pedido.id }}</h3>

<div class="card p-3 mb-3">
  <strong>Cliente:</strong> {{ pedido.nome }}<br>
  <strong>Telefone:</strong> {{ pedido.telefone }}<br>
  <strong>Endereço:</strong> {{ pedido.endereco }}<br>
  <strong>Pagamento:</strong> {{ pedido.forma_pagamento }}<br>
  <strong>Total:</strong> R$ {{ "%.2f"|format(pedido.total) }}
</div>

<div class="card p-3 mb-3">
  <h5>Itens</h5>
  <ul>
    {% for item in itens %}
      <li>{{ item.nome }} - {{ item.qtd }}x</li>
    {% endfor %}
  </ul>
</div>

<div class="card p-3">
  <h5>Status</h5>

  <form method="post">
    <select name="status" class="form-select mb-2">
      <option value="novo" {% if pedido.status == "novo" %}selected{% endif %}>Novo</option>
      <option value="preparando" {% if pedido.status == "preparando" %}selected{% endif %}>Preparando</option>
      <option value="saiu_entrega" {% if pedido.status == "saiu_entrega" %}selected{% endif %}>Saiu para entrega</option>
      <option value="entregue" {% if pedido.status == "entregue" %}selected{% endif %}>Entregue</option>
      <option value="cancelado" {% if pedido.status == "cancelado" %}selected{% endif %}>Cancelado</option>
      <option value="pago" {% if pedido.status == "pago" %}selected{% endif %}>Pago</option>
    </select>

    <button class="btn btn-dark">Atualizar Status</button>
  </form>
</div>

</div>
</body>
</html>
