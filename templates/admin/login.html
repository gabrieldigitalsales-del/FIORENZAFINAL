<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin • Fiorenza</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5" style="max-width:420px;">
    <div class="card p-4 shadow-sm">
      <h1 class="h5 fw-bold">Admin Login</h1>
      <p class="text-muted small">Entre com a senha do administrador.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class="alert alert-{{category}}">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input name="senha" class="form-control" required>
        </div>
        <button class="btn btn-dark w-100">Entrar</button>
      </form>

      <a class="small mt-3 d-block" href="/">Voltar ao site</a>
    </div>
  </div>
</body>
</html>
