<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin • Configurações</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin">Admin • Fiorenza</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="/admin/produtos">Produtos</a>
        <a class="btn btn-outline-light btn-sm" href="/admin/categorias">Categorias</a>
        <a class="btn btn-outline-danger btn-sm" href="/admin/logout">Sair</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4" style="max-width:820px;">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="alert alert-{{category}}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card p-3 shadow-sm">
      <div class="fw-bold mb-2">Configurações do site</div>

      <form method="post">
        <div class="row g-2">
          <div class="col-12 col-md-6">
            <label class="form-label">Nome do site</label>
            <input name="site_name" class="form-control" value="{{ cfg.site_name }}">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Telefone</label>
            <input name="telefone" class="form-control" value="{{ cfg.telefone }}">
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label">WhatsApp (somente números)</label>
            <input name="whatsapp" class="form-control" value="{{ cfg.whatsapp }}">
            <div class="form-text">Ex: 5531999999999</div>
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label">Cidade de entrega</label>
            <input name="entrega_cidade" class="form-control" value="{{ cfg.entrega_cidade }}">
          </div>

          <div class="col-12">
            <label class="form-label">Endereço linha 1</label>
            <input name="endereco_linha1" class="form-control" value="{{ cfg.endereco_linha1 }}">
          </div>
          <div class="col-12">
            <label class="form-label">Endereço linha 2</label>
            <input name="endereco_linha2" class="form-control" value="{{ cfg.endereco_linha2 }}">
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label">Logo (URL ou /static/...)</label>
            <input name="logo_url" class="form-control" value="{{ cfg.logo_url }}">
          </div>

          <div class="col-12 col-md-6 d-flex align-items-center">
            <div class="form-check mt-4">
              <input class="form-check-input" type="checkbox" name="frete_gratis" {% if cfg.frete_gratis %}checked{% endif %}>
              <label class="form-check-label fw-semibold">Frete grátis</label>
            </div>
          </div>
        </div>

        <button class="btn btn-dark w-100 mt-3">Salvar</button>
      </form>
    </div>
  </div>
</body>
</html>
