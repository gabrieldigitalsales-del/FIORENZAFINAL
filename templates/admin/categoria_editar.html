<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin • Editar Categoria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin">Admin • Fiorenza</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="/admin/categorias">Voltar</a>
        <a class="btn btn-outline-danger btn-sm" href="/admin/logout">Sair</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4" style="max-width:720px;">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="alert alert-{{category}}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card p-3 shadow-sm">
      <div class="fw-bold mb-2">Editar categoria</div>

      <form method="post">
        <div class="mb-2">
          <label class="form-label">Nome</label>
          <input name="nome" class="form-control" value="{{ categoria.nome }}" required>
        </div>

        <div class="mb-2">
          <label class="form-label">Ordem</label>
          <input name="ordem" type="number" class="form-control" value="{{ categoria.ordem }}">
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" name="ativo" {% if categoria.ativo %}checked{% endif %}>
          <label class="form-check-label fw-semibold">Ativo</label>
        </div>

        <button class="btn btn-dark w-100">Salvar alterações</button>
      </form>
    </div>
  </div>
</body>
</html>
